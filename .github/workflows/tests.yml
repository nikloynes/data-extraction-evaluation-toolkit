name: data-extraction-evaluation-toolkit tests

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

permissions:
  contents: read
  pull-requests: write

jobs:
  data-extraction-evaluation-toolkit_tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12.11"
    if: github.event.pull_request.draft == false
    env:
      UV_CACHE_DIR: /tmp/.uv-cache  # Configure a constant location for the uv cache
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up python
        uses: actions/setup-python@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.11"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
            uv-${{ runner.os }}

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests with pytest
        run: |
          TARGET_BRANCH=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          else
            TARGET_BRANCH="${{ github.ref_name }}"
          fi

          echo "Target branch is: $TARGET_BRANCH"

          if [ "$TARGET_BRANCH" = "main" ]; then
            echo "Running all tests (including real files)..."
            uv run pytest --cov=deet --cov-report=xml
          else
            echo "Omitting real file parser tests..."
            uv run pytest --ignore=tests/test_parser_real_files.py --cov=deet --cov-report=xml
          fi

      - name: Code coverage reporting
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: file
          thresholds: "80 90"

      - name: Add title to coverage markdown file
        run: |
          echo '## data-extraction-evaluation-toolkit coverage' > data-extraction-evaluation-toolkit.md
          echo '---' >> data-extraction-evaluation-toolkit.md
          cat code-coverage-results.md >> data-extraction-evaluation-toolkit-results.md

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        if: github.event_name == 'pull_request'
        with:
          header: "data-extraction-evaluation-toolkit Coverage"
          recreate: true
          path: data-extraction-evaluation-toolkit-results.md

      - name: Minimize uv cache
        run: uv cache prune --ci
